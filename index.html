<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Radio fouedb Music Webplayer">

<title>Radio fouedb Music</title>

<link rel="shortcut icon" href="https://radiofouedbmusic.weebly.com/uploads/2/7/3/9/27392993/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<link rel="stylesheet" href="https://radiofouedbmusic.weebly.com/uploads/2/7/3/9/27392993/base-rfbm-3-v10.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
<script defer src="https://radiofouedbmusic.weebly.com/uploads/2/7/3/9/27392993/scripts-rfbm-3-v10.js"></script>

</head>

<body>

<div class="player-wrapper">

<div class="player">

    <!-- =========================
         ALBUM
    ========================== -->

    <div class="album-section">

        <div class="album-art">

            <img
                id="cover"
                src="https://radiofouedbmusic.weebly.com/uploads/2/7/3/9/27392993/noalbum-white-2.png"
                alt="cover">

            <!-- LIVE -->

            <div class="live-badge">

                <span class="live-dot"></span>

                LIVE

            </div>

            <!-- RADIO -->

            <div class="rfbm">

                <span class="radio-name"></span>

                RFBM

            </div>

        </div>

    </div>

    <!-- =========================
         INFORMATIONS
    ========================== -->

    <div class="info-section">

        <div
            id="title"
            class="title">

            Loading...

        </div>

        <div
            id="artist"
            class="artist">

        </div>

        <div
            id="album"
            class="album">

        </div>

        <!-- PROGRESS -->

        <div class="progress-container">

            <div
                id="progressBar"
                class="progress-bar">

            </div>

        </div>

        <!-- TIMER -->

        <div class="timer">

            <span id="elapsed">

                00:00

            </span>

            <span class="separator">

                /

            </span>

            <span id="duration">

                00:00

            </span>

            <span
                id="remaining"
                class="remaining">

                (-00:00)

            </span>

        </div>

        <!-- NETWORK -->

        <div
            id="networkStatus"
            class="network-online">

            <span
                class="network-dot">

            </span>

            <span
                id="networkText">

                CONNECTED

            </span>

        </div>

        <!-- VOLUME -->

        <div class="volume-container">

            <i class="fas fa-volume-up"></i>

            <input
                id="volume"
                type="range"
                min="0"
                max="100"
                value="80">

        </div>

    </div>

    <!-- =========================
         COMMANDES
    ========================== -->

    <div class="controls-section">
        
        <!-- CODEC INFO -->

        <div
            id="codecInfo">

                MP3 • CODEC • 320 kbps

        </div>

        <!-- CODEC BUTTONS -->

        <div class="codec-buttons">

            <button
                id="mp3Btn"
                class="codec-btn active">

                MP3

            </button>

            <button
                id="aacBtn"
                class="codec-btn">

                AAC

            </button>

            <button
                id="m4aBtn"
                class="codec-btn">

                M4A

            </button>

        </div>
        
        <!-- CONTROLS -->

        <div class="controls">

            <button
                id="playBtn"
                class="control-btn play">

                <img
                    id="playIcon"
                    src="https://radiofouedbmusic.weebly.com/uploads/2/7/3/9/27392993/play-rfbm.png"
                    alt="play">

            </button>

            <button
                id="stopBtn"
                class="control-btn stop">

                <img
                    src="https://radiofouedbmusic.weebly.com/uploads/2/7/3/9/27392993/stop-rfbm.png"
                    alt="stop">

            </button>

            <button
                id="muteBtn"
                class="control-btn mute">

                <img
                    id="muteIcon"
                    src="https://radiofouedbmusic.weebly.com/uploads/2/7/3/9/27392993/volume-rfbm.png"
                    alt="mute">

            </button>

            <button
                id="refreshBtn"
                class="control-btn refresh">

                <img
                    id="refreshIcon"
                    src="https://radiofouedbmusic.weebly.com/uploads/2/7/3/9/27392993/refresh-rfbm.png"
                    alt="refresh">

            </button>

        </div>

        

    </div>

</div>

</div>

<!-- TOAST -->

<div
    id="toast"
    class="toast">

</div>    

</body>

</html>
